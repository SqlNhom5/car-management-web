server:
  port: ${PORT:8080}  # Sử dụng biến PORT từ Railway, mặc định là 8080 nếu không có

spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/CarManagement?createDatabaseIfNotExist=true}
    username: ${MYSQLUSER:root}
    password: ${MYSQLPASSWORD:Hoangkhanhvan703}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
